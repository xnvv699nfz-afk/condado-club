<style>

:root {
  /* Design tokens — from theme.css */
  --gold: #E8A94A;
  --gold-light: #F5C878;
  --gold-dim: rgba(232,169,74,0.12);
  --gold-border: rgba(232,169,74,0.35);
  --night: #080509;
  --night-2: #0F0B14;
  --night-3: #160F1C;
  --white: #FFFFFF;
  --w60: rgba(255,255,255,0.6);
  --w40: rgba(255,255,255,0.4);
  --w15: rgba(255,255,255,0.15);
  --w08: rgba(255,255,255,0.08);
  --w05: rgba(255,255,255,0.05);
  --serif: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --serif-weight: 800;
  --serif-tracking: -0.5px;
  --serif-italic-weight: 300;
  --sans: 'Barlow', system-ui, sans-serif;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  /* Tweak-driven scales */
  --type-scale: 1;
  --pad-scale: 1;
  --hero-min: 100svh;
  --grad-strength: 0.4;
  --hero-grad: linear-gradient(to right,#F0781A 0%,#C84018 10%,#9B2015 22%,#6B1030 38%,#3D0848 55%,#1A041E 72%,#080509 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--night);
  color: var(--white);
  font-family: var(--sans);
  font-size: 16px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
button { font-family: var(--sans); cursor: pointer; border: none; background: none; color: inherit; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--night); }
::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

.serif {
  font-family: var(--serif);
  font-weight: var(--serif-weight);
  letter-spacing: var(--serif-tracking);
}
.serif em { font-weight: var(--serif-italic-weight); font-style: normal; }
.eyebrow {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
}
.micro {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--w40);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 26px;
  border-radius: var(--radius-sm);
  transition: all 200ms ease;
  cursor: pointer;
  white-space: nowrap;
}
.btn-gold { background: var(--gold); color: var(--night); }
.btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--w60); border: 1px solid var(--w15); }
.btn-ghost:hover { border-color: var(--gold-border); color: var(--gold); }
.btn-sm { padding: 10px 18px; font-size: 9px; letter-spacing: 1.5px; }

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scrollAnim {
  0% { transform: scaleY(0); transform-origin: top; }
  50% { transform: scaleY(1); transform-origin: top; }
  51% { transform: scaleY(1); transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

.reveal { opacity: 0; transform: translateY(20px); transition: all 700ms cubic-bezier(0.16, 1, 0.3, 1); }
.reveal.in { opacity: 1; transform: translateY(0); }

/* Nav */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 24px;
  transition: all 400ms ease;
}
.nav.scrolled {
  background: rgba(8,5,9,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 14px 24px;
  border-bottom: 1px solid var(--w08);
}
@media (min-width: 1024px) {
  .nav { padding: 26px 56px; }
  .nav.scrolled { padding: 16px 56px; }
}

.nav-links { display: none; gap: 30px; list-style: none; }
.nav-link {
  font-size: 10.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--w60);
  transition: color 200ms ease;
  position: relative;
  padding: 4px 0;
}
.nav-link:hover, .nav-link.active { color: var(--white); }
.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 1px;
  background: var(--gold);
}
@media (min-width: 1024px) { .nav-links { display: flex; } }

.nav-cta { display: none; }
@media (min-width: 1024px) { .nav-cta { display: inline-flex; } }

.burger {
  width: 40px; height: 40px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px;
}
.burger span { display: block; width: 22px; height: 1.5px; background: var(--white); transition: all 300ms ease; }
.burger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 5px); }
.burger.open span:nth-child(2) { opacity: 0; }
.burger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -5px); }
@media (min-width: 1024px) { .burger { display: none; } }

/* Mobile drawer */
.drawer {
  position: fixed;
  inset: 0;
  z-index: 199;
  background: rgba(8,5,9,0.97);
  backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  padding: 80px 24px 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 300ms ease;
}
.drawer.open { opacity: 1; pointer-events: auto; }
.drawer-link {
  font-family: var(--serif);
  font-size: 42px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: color 200ms ease;
}
.drawer-link:hover, .drawer-link.active { color: var(--gold); }
.drawer-link.active em { font-style: normal; }

/* Logo */
.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--serif);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-size: 17px;
  line-height: 1;
}
.logo-mark {
  width: 30px; height: 30px;
  border-radius: 999px;
  border: 1.5px solid var(--white);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.logo-mark::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--white);
  clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
}
.logo-text { display: flex; flex-direction: column; gap: 0; line-height: 0.92; }
.logo-text small { font-size: 10px; font-weight: 600; letter-spacing: 4px; color: var(--w60); }

/* Sections / containers */
.container { padding: calc(80px * var(--pad-scale)) 24px; }
@media (min-width: 768px) { .container { padding: calc(96px * var(--pad-scale)) 56px; } }
.container-narrow { max-width: 880px; margin: 0 auto; }
.container-wide  { max-width: 1440px; margin: 0 auto; }

.section-head {
  display: flex; flex-direction: column; gap: 24px;
  margin-bottom: calc(40px * var(--pad-scale));
}
.section-head h2 {
  font-family: var(--serif);
  font-weight: var(--serif-weight);
  text-transform: uppercase;
  font-size: calc(clamp(38px, 5vw, 64px) * var(--type-scale));
  line-height: 0.92;
  letter-spacing: var(--serif-tracking);
}
.section-head h2 em { font-style: normal; font-weight: var(--serif-italic-weight); color: var(--gold); }
@media (min-width: 768px) {
  .section-head { flex-direction: row; justify-content: space-between; align-items: flex-end; }
}

/* Ticker */
.ticker {
  overflow: hidden;
  border-top: 1px solid var(--w08);
  border-bottom: 1px solid var(--w08);
  background: var(--night-2);
  padding: 14px 0;
}
.ticker-track {
  display: flex;
  white-space: nowrap;
  animation: ticker 32s linear infinite;
}
.ticker-track:hover { animation-play-state: paused; }
.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 24px;
  padding: 0 28px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--w40);
}
.ticker-item strong { color: var(--gold); font-weight: 700; }
.ticker-dot { width: 4px; height: 4px; border-radius: 999px; background: var(--gold-border); flex-shrink: 0; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(2, 1fr); border-bottom: 1px solid var(--w08); }
@media (min-width: 768px) { .stats { grid-template-columns: repeat(4, 1fr); } }
.stat { padding: 28px 24px; border-right: 1px solid var(--w08); border-bottom: 1px solid var(--w08); }
@media (min-width: 768px) { .stat { padding: 40px; border-bottom: 0; } .stat:last-child { border-right: 0; } }
.stat-num { font-family: var(--serif); font-weight: 800; color: var(--gold); font-size: clamp(32px, 4vw, 46px); line-height: 1; margin-bottom: 6px; letter-spacing: -1px; }
.stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--w40); line-height: 1.5; }

/* Cards */
.card {
  background: var(--night-2);
  border: 1px solid var(--w08);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: all 300ms ease;
}
.card:hover { border-color: var(--gold-border); transform: translateY(-4px); }

/* Footer */
.footer { padding: 64px 24px 32px; border-top: 1px solid var(--w08); }
@media (min-width: 768px) { .footer { padding: 80px 56px 32px; } }
.footer-grid {
  display: grid;
  gap: 40px;
  grid-template-columns: 1fr;
  margin-bottom: 40px;
}
@media (min-width: 768px) { .footer-grid { grid-template-columns: 1.4fr 1fr 1fr; gap: 56px; } }

/* Form */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 9.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--w05);
  border: 1px solid var(--w15);
  color: var(--white);
  font-family: var(--sans);
  font-size: 14px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 200ms ease;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold-border); background: var(--w08); }
.field textarea { resize: vertical; min-height: 120px; }

/* Chip / filter */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 1px solid var(--w15);
  color: var(--w60);
  cursor: pointer;
  transition: all 200ms ease;
  background: transparent;
  white-space: nowrap;
}
.chip:hover { border-color: var(--gold-border); color: var(--gold); }
.chip.active { background: var(--gold); color: var(--night); border-color: var(--gold); font-weight: 700; }

/* Page transitions */
.page-enter { animation: fadeUp 600ms cubic-bezier(0.16, 1, 0.3, 1) both; }

</style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {

    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>

      </div>

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function Nav({ route, onNav }) {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);

  useEffect(() => { setOpen(false); document.body.style.overflow = ''; }, [route]);

  const toggle = () => {
    const next = !open;
    setOpen(next);
    document.body.style.overflow = next ? 'hidden' : '';
  };

  const go = (path) => (e) => {
    e.preventDefault();
    onNav(path);
  };

  return (
    <>
      <nav className={`nav${scrolled || route !== '/' ? ' scrolled' : ''}`}>
        <Logo />
        <ul className="nav-links">
          {NAV_ITEMS.map((item) => (
            <li key={item.path}>
              <a
                href={item.path}
                onClick={go(item.path)}
                className={`nav-link${route === item.path || (item.path === '/sala' && route === '/artistas') ? ' active' : ''}`}
              >
                {item.name}
              </a>
            </li>
          ))}
        </ul>
        <button className={`burger${open ? ' open' : ''}`} onClick={toggle} aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </nav>

      <div className={`drawer${open ? ' open' : ''}`}>
        {NAV_ITEMS.map((item) => (
          <a
            key={item.path}
            href={item.path}

            className={`drawer-link${route === item.path ? ' active' : ''}`}
          >
            {item.name}
          </a>
        ))}

        </div>
      </div>
    </>
  );
}

const MONTH_NUM = { abr: 4, may: 5, jun: 6, jul: 7, ago: 8 };
const MONTH_ABR  = { abr: 'ABR', may: 'MAY', jun: 'JUN', jul: 'JUL', ago: 'AGO' };
const MONTH_NAME = { abr: 'Abril', may: 'Mayo', jun: 'Junio', jul: 'Julio', ago: 'Agosto' };
const WEEK_DAYS_ES = ['LUN', 'MAR', 'MIÉ', 'JUE', 'VIE', 'SÁB', 'DOM'];

function Calendario({ onNav }) {
  const [month, setMonth] = useState('all');
  const [view,  setView]  = useState('grid');

  const today = new Date();
  const futureEvents = EVENTS.filter((ev) => {
    const evDate = new Date(2026, (MONTH_NUM[ev.monthKey] || 1) - 1, parseInt(ev.day, 10));
    return evDate >= today;
  });

  const availableMonths = [...new Set(futureEvents.map(ev => ev.monthKey))];
  const filtered      = month === 'all' ? futureEvents : futureEvents.filter(e => e.monthKey === month);
  const monthsToShow  = month === 'all' ? availableMonths : [month];

  function buildCells(mk) {
    const m      = MONTH_NUM[mk];
    const dow    = new Date(2026, m - 1, 1).getDay();
    const offset = dow === 0 ? 6 : dow - 1;
    const total  = new Date(2026, m, 0).getDate();
    const cells  = Array(offset).fill(null);
    for (let d = 1; d <= total; d++) cells.push(d);
    while (cells.length % 7) cells.push(null);
    return cells;
  }

  const evMap = {};
  filtered.forEach(ev => { evMap[`${ev.monthKey}-${parseInt(ev.day, 10)}`] = ev; });

  return (
    <div className="page-enter">
      <PageHeader
        eyebrow="Agenda completa · 2026"
        title='Calendario'
      />

      <div style={{ padding: '0 24px 100px' }}>
        <div className="container-wide" style={{ margin: '0 auto' }}>

          {/* ── Controles ── */}
          <div className="cc-controls">
            <div className="cc-view-group">
              <button className={`cc-btn${view === 'grid'     ? ' cc-active' : ''}`} onClick={() => setView('grid')}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Grid
              </button>
              <button className={`cc-btn${view === 'calendar' ? ' cc-active' : ''}`} onClick={() => setView('calendar')}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
                Calendario
              </button>
            </div>
            <div className="cc-month-group">
              <button className={`cc-btn${month === 'all' ? ' cc-active' : ''}`} onClick={() => setMonth('all')}>Todos</button>
              {availableMonths.map(mk => (
                <button key={mk} className={`cc-btn${month === mk ? ' cc-active' : ''}`} onClick={() => setMonth(mk)}>
                  {MONTH_ABR[mk]}
                </button>
              ))}
            </div>
          </div>

          {/* ── Vista Grid ── */}
          {view === 'grid' && (
            filtered.length === 0
              ? <div style={{ textAlign: 'center', padding: '80px 0', color: 'var(--w40)' }}>No hay eventos disponibles.</div>
              : (
                <div className="cc-grid">
                  {filtered.map(ev => (
                    <div key={ev.id} className="cc-card-wrap">
                      <p className="cc-card-hdr">{ev.dayName} · {ev.day} {ev.month.toUpperCase()}</p>
                      <article className="cc-card">
                        <img src={ev.image} alt={ev.name} className="cc-card-img" />
                        <div className="cc-card-grad"></div>
                        <div className="cc-card-body">
                          <h3 className="serif cc-card-title">{ev.name}</h3>
                          <p className="cc-card-artist">{ev.support}</p>
                          <button className="btn btn-gold cc-card-cta">Tickets y VIP</button>
                        </div>
                      </article>
                    </div>
                  ))}
                </div>
              )
          )}

          {/* ── Vista Calendario ── */}
          {view === 'calendar' && (
            <div>
              {monthsToShow.map(mk => {
                const cells = buildCells(mk);
                return (
                  <div key={mk} className="cc-month">
                    <p className="cc-month-title">{MONTH_NAME[mk].toUpperCase()} 2026</p>
                    <div className="cc-cal-grid">
                      {WEEK_DAYS_ES.map(d => <div key={d} className="cc-cal-hdr">{d}</div>)}
                      {cells.map((day, i) => {
                        const ev = day ? evMap[`${mk}-${day}`] : null;

                          <div key={i}
                               className={`cc-cal-cell${ev ? ' has-ev' : ''}${!day ? ' pad' : ''}`}
                               >
                            {day && <span className="cc-cal-num">{day}</span>}

                                <p className="cc-cal-evname">{ev.name}</p>
                                <p className="cc-cal-evartist">{ev.support}</p>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          color: var(--w40); margin-bottom: 10px; font-weight: 500;

              <div key={i} style={{ borderTop: '1px solid var(--w08)', paddingTop: 32 }}>
                <h2 className="serif" style={{ fontSize: 18, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 14, color: 'var(--w80)' }}>{s.title}</h2>
                {s.paragraphs && s.paragraphs.length > 0 && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: s.list ? 16 : 0 }}>
                    {s.paragraphs.map((p, j) => <p key={j} style={pStyle}>{p}</p>)}
                  </div>
                )}
                {s.list && (
                  <ul style={{ ...listStyle, marginBottom: s.after ? 16 : 0 }}>
                    {s.list.map((item, j) => (
                      <li key={j} style={{ fontSize: 14, color: 'var(--w60)', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                        <span style={{ color: 'var(--gold)', flexShrink: 0, marginTop: 2 }}>·</span>
                        {item}
                      </li>
                    ))}
                  </ul>
                )}
                {s.after && s.after.length > 0 && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginTop: 12 }}>
                    {s.after.map((p, j) => <p key={j} style={pStyle}>{p}</p>)}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </section>
    </div>
  );
}

Object.assign(window, { EventosPrivados, Contacto, AvisoLegal, PoliticaPrivacidad, PoliticaCookies });


// === app.jsx ===

// Main app — hash router + tweaks
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "vibe": "gold",
  "display": "condensed",
  "intensity": "editorial"
}/*EDITMODE-END*/;

// Vibe palettes — accent system that reshapes mood
const VIBES = {
  gold:    { name: 'Gold',    main: '#E8A94A', light: '#F5C878', dim: 'rgba(232,169,74,0.12)', border: 'rgba(232,169,74,0.35)', heroGrad: 'linear-gradient(to right,#F0781A 0%,#C84018 10%,#9B2015 22%,#6B1030 38%,#3D0848 55%,#1A041E 72%,#080509 100%)' },
  neon:    { name: 'Neon',    main: '#C8FF2E', light: '#E0FF7A', dim: 'rgba(200,255,46,0.12)',  border: 'rgba(200,255,46,0.40)',  heroGrad: 'linear-gradient(to right,#1FCB4F 0%,#0E9B5B 18%,#0A6E5C 35%,#1B3556 55%,#160F1C 75%,#080509 100%)' },
  crimson: { name: 'Crimson', main: '#FF3A6E', light: '#FF7A9A', dim: 'rgba(255,58,110,0.14)',  border: 'rgba(255,58,110,0.40)',  heroGrad: 'linear-gradient(to right,#FF1F4F 0%,#D11B6A 18%,#7A1380 38%,#3D0848 60%,#1A041E 80%,#080509 100%)' },
  ice:     { name: 'Ice',     main: '#5DD6FF', light: '#A8E8FF', dim: 'rgba(93,214,255,0.14)',  border: 'rgba(93,214,255,0.45)',  heroGrad: 'linear-gradient(to right,#1F8FE0 0%,#1F5BD1 22%,#3A1FB0 45%,#2A0F7A 62%,#160933 80%,#080509 100%)' },
};

// Display type — different typographic personalities
const DISPLAYS = {
  condensed: { name: 'Condensed', family: "'Barlow Condensed', sans-serif", weight: 800, tracking: '-0.5px', italicWeight: 300, googleFonts: 'Barlow+Condensed:wght@300;400;600;700;800' },
  editorial: { name: 'Editorial', family: "'Playfair Display', 'Times New Roman', serif", weight: 900, tracking: '-1.5px', italicWeight: 400, googleFonts: 'Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700' },
  hyper:     { name: 'Hyper',     family: "'Anton', 'Arial Black', sans-serif", weight: 400, tracking: '0.5px', italicWeight: 400, googleFonts: 'Anton' },
  mono:      { name: 'Mono',      family: "'Space Grotesk', system-ui, sans-serif", weight: 700, tracking: '-1px', italicWeight: 400, googleFonts: 'Space+Grotesk:wght@400;500;700' },
};

// Intensity — spacing, type scale, gradient drama
const INTENSITIES = {
  cinematic: { name: 'Cinematic', scale: 1.18, pad: 1.25, heroMin: '108svh', gradStrength: 0.55, contrast: 1.08 },
  editorial: { name: 'Editorial', scale: 1.00, pad: 1.00, heroMin: '100svh', gradStrength: 0.40, contrast: 1.00 },
  compact:   { name: 'Compact',   scale: 0.86, pad: 0.72, heroMin: '82svh',  gradStrength: 0.28, contrast: 0.94 },
};

function applyTweaks(t) {
  const vibe = VIBES[t.vibe] || VIBES.gold;
  const display = DISPLAYS[t.display] || DISPLAYS.condensed;
  const intensity = INTENSITIES[t.intensity] || INTENSITIES.editorial;
  const r = document.documentElement.style;

  // Vibe palette
  r.setProperty('--gold', vibe.main);
  r.setProperty('--gold-light', vibe.light);
  r.setProperty('--gold-dim', vibe.dim);
  r.setProperty('--gold-border', vibe.border);
  r.setProperty('--hero-grad', vibe.heroGrad);

  // Display type
  r.setProperty('--serif', display.family);
  r.setProperty('--serif-weight', String(display.weight));
  r.setProperty('--serif-tracking', display.tracking);
  r.setProperty('--serif-italic-weight', String(display.italicWeight));

  // Intensity
  r.setProperty('--type-scale', String(intensity.scale));
  r.setProperty('--pad-scale', String(intensity.pad));
  r.setProperty('--hero-min', intensity.heroMin);
  r.setProperty('--grad-strength', String(intensity.gradStrength));

  // Ensure Google Font loaded for current display
  const fontId = 'tweak-font-' + t.display;
  if (display.googleFonts && !document.getElementById(fontId)) {
    const link = document.createElement('link');
    link.id = fontId;
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${display.googleFonts}&display=swap`;
    document.head.appendChild(link);
  }
}

const ROUTES = {
  '/': Home,
  '/calendario': Calendario,
  '/mesas-vip': MesasVIP,
  '/sala': Sala,
  '/artistas': Artistas,
  '/eventos-privados': EventosPrivados,
  '/contacto': Contacto,
  '/aviso-legal': AvisoLegal,
  '/politica-privacidad': PoliticaPrivacidad,
  '/politica-cookies': PoliticaCookies,
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => { applyTweaks(t); }, [t.vibe, t.display, t.intensity]);

  const [route, setRoute] = useState(() => {
    const p = window.location.pathname;
    return ROUTES[p] ? p : '/';
  });

  useEffect(() => {
    const onPopState = () => {
      const p = window.location.pathname || '/';
      const next = ROUTES[p] ? p : '/';
      setRoute(next);
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    window.addEventListener('popstate', onPopState);
    return () => window.removeEventListener('popstate', onPopState);
  }, []);

  const onNav = (path) => {
    history.pushState(null, '', path);
    window.dispatchEvent(new PopStateEvent('popstate'));
  };

  // Reveal-on-scroll
  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.1 }
    );
    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    return () => observer.disconnect();
  }, [route]);

  const PageComponent = ROUTES[route] || Home;

  return (
    <>
      <Nav route={route} onNav={onNav} />
      <main key={route}>
        <PageComponent onNav={onNav} />
      </main>
      <Footer onNav={onNav} />
      <TweaksPanel>
        <TweakSection label="Vibe" />
        <TweakColor
          label="Accent palette"
          value={VIBES[t.vibe].main}
          options={Object.values(VIBES).map(v => v.main)}
          onChange={(hex) => {
            const key = Object.entries(VIBES).find(([_, v]) => v.main === hex)?.[0] || 'gold';
            setTweak('vibe', key);
          }}
        />
        <TweakSection label="Display type" />
        <TweakSelect
          label="Personality"
          value={t.display}
          options={Object.entries(DISPLAYS).map(([k, v]) => ({ value: k, label: v.name }))}
          onChange={(v) => setTweak('display', v)}
        />
        <TweakSection label="Intensity" />
        <TweakRadio
          label="Spacing & scale"
          value={t.intensity}
          options={Object.keys(INTENSITIES)}
          onChange={(v) => setTweak('intensity', v)}
        />
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
